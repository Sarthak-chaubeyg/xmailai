[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# The status function uses v2 config.path for routing (/api/status)
# The research-background function needs a redirect since it uses the -background suffix
[[redirects]]
  from = "/api/research"
  to = "/.netlify/functions/research-background"
  status = 200
